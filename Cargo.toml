[package]
name = "rust-stats"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Pure-Rust statistical modeling, statsmodels-inspired"

[dependencies]
faer = "0.22"
statrs = "0.18"
thiserror = "2"
once_cell = "1"
rayon = "1.10"
pulp = "0.21"
bytemuck = "1"
arrow = { version = "58", optional = true, default-features = false }

[features]
default = []
arrow = ["dep:arrow"]

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
approx = "0.5"
